name: Simple Claude Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Lire le fichier JS
      - name: Read code
        run: |
          echo "CODE<<EOF" >> $GITHUB_ENV
          cat index.js >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 3️⃣ Construire le prompt
      - name: Create prompt
        run: |
          PROMPT=$(cat prompt.txt)
          PROMPT="${PROMPT//'{{CODE}}'/$CODE}"
          echo "$PROMPT" > final_prompt.txt

      # 4️⃣ Appeler Claude
      - name: Call Claude API
        env:
          API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          curl https://api.anthropic.com/v1/messages \
          -H "x-api-key: $API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"claude-3-haiku-20240307\",
            \"messages\": [
              {
                \"role\": \"user\",
                \"content\": \"$(cat final_prompt.txt)\"
              }
            ]
          }" > result.json

      # 5️⃣ Poster le commentaire dans la PR
      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const res = JSON.parse(fs.readFileSync('result.json'));
            const text = res.content[0].text;

            github.rest.issues.createComment({
              ...context.issue,
              body: text
            });
