name: Simple Claude Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Lire le fichier JS
      - name: Read code
        run: |
          echo "CODE<<EOF" >> $GITHUB_ENV
          cat index.js >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 3️⃣ Construire le prompt
      - name: Create prompt
        run: |
          PROMPT=$(cat prompt.txt)
          PROMPT="${PROMPT//'{{CODE}}'/$CODE}"
          echo "$PROMPT" > final_prompt.txt

      # 4️⃣ Appeler Claude
      - name: Call Claude API
        env:
          API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PROMPT=$(cat final_prompt.txt)
          jq -n --arg prompt "$PROMPT" \
            '{model: "claude-haiku-4-5-20251001", max_tokens: 1024, messages: [{role: "user", content: $prompt}]}' \
            > body.json
          curl -f https://api.anthropic.com/v1/messages \
            -H "x-api-key: $API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d @body.json > result.json

      # 5️⃣ Poster le commentaire dans la PR
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const res = JSON.parse(fs.readFileSync('result.json'));
            if (!res.content || !res.content[0]) {
              core.setFailed(`Claude API error: ${JSON.stringify(res)}`);
              return;
            }
            const text = res.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: text
            });
